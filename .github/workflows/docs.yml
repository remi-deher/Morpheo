name: Documentation

on:
  push:
    branches: [ "main" ]
    # Only rebuild docs when something that affects them changes.
    paths:
      - "docs/**"
      - "**/*.cs"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

# Avoid concurrent Pages deployments racing each other.
concurrency:
  group: docs-deploy
  cancel-in-progress: true

# Least privilege at the top; the deploy job widens to what it needs.
permissions:
  contents: read

# Run JavaScript actions on Node 24 now (the newest runtime GitHub Actions supports),
# ahead of the June 2026 default switch. Node 26 is not available on Actions runners.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # required by actions-gh-pages to push to gh-pages
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.x

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Install DocFX
        # Pinned so a bad DocFX release cannot silently break the docs build.
        run: dotnet tool install -g docfx --version 2.78.5

      - name: Build Documentation
        run: docfx docs/docfx.json

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: docs/_site
          force_orphan: true
