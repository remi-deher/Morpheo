version: 2
updates:
  # Keep NuGet package references up to date across the solution.
  - package-ecosystem: "nuget"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      # Bundle non-major bumps into a single PR to reduce noise.
      nuget-minor-patch:
        update-types:
          - "minor"
          - "patch"
    commit-message:
      prefix: "deps"

  # Keep the GitHub Actions used in workflows up to date.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "ci"
